[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION            = "20"
  SECRETS_SCAN_OMIT_KEYS  = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_ADMIN_EMAIL,ADMIN_CODES"

# SPA redirect — toutes les routes vers index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://js.stripe.com; script-src 'self' https://js.stripe.com https://hooks.stripe.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com"
