[build]
  command   = "npm run build && cp netlify/_headers dist/_headers"
  publish   = "dist"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# ── Dev local via `npm run dev:netlify` (netlify dev) ──────────────────────
# Démarre Vite sur :5173 et expose les fonctions Netlify sur le même port proxy.
# Les appels /api/* sont redirigés vers /.netlify/functions/* (voir [[redirects]] ci-dessous).
# NE PAS utiliser `npm run dev` seul — les fonctions API ne seront pas accessibles.
[dev]
  command     = "npm run dev"
  targetPort  = 5173
  port        = 8888
  autoLaunch  = false

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[build.environment]
  NODE_VERSION            = "20"
  SECRETS_SCAN_OMIT_KEYS  = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_ADMIN_EMAIL,ADMIN_CODES"

# SPA redirect — toutes les routes vers index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Les headers de sécurité sont générés uniquement pour le build de production
# via netlify/_headers afin de ne pas casser le preamble inline de Vite/React
# pendant `netlify dev`.
